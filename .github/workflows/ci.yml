name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r check-types
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  build:
    runs-on: ubuntu-latest
    needs: [format, check-types, lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/blog/Dockerfile
          pull: true
          push: false
          tags: local/blog:${{ github.sha }}
          build-args: |
            SITE_URL=http://localhost:3000
          cache-from: type=gha,scope=blog-cache
          cache-to: type=gha,scope=blog-cache,mode=max
