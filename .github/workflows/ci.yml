name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r check-types
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  build-and-push:
    runs-on: ubuntu-24.04-arm
    needs: [format, check-types, lint, test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/blog-ecr-push-role
          aws-region: ${{ vars.AWS_REGION }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/blog/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry || 'local' }}/blog:${{ github.sha }}
          build-args: |
            SITE_URL=http://localhost:3000
          provenance: false
          platforms: linux/arm64
          cache-from: type=gha,scope=blog-cache
          cache-to: type=gha,scope=blog-cache,mode=max
