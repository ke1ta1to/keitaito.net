name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r check-types
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: ./package.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
