  /uploads/presign:
    post:
      summary: Generate a presigned URL for file upload
      description: Generate a presigned PUT URL for uploading a file directly to S3
      operationId: uploads_presign
      tags:
        - Uploads
      security:
        - OAuth2:
            - api/uploads.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
