openapi: 3.0.4
info:
  title: keitaito.net API
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://keitaito.net/api

paths:
  /activities:
    get:
      summary: List all activities
      description: Retrieve a list of all activities
      operationId: activities_list
      tags:
        - Activities
      security:
        - OAuth2:
            - api/activities.read
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create a new activity
      description: Create a new activity with the provided details
      operationId: activities_create
      tags:
        - Activities
      security:
        - OAuth2:
            - api/activities.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - date
                - description
              properties:
                title:
                  type: string
                  description: Title of the activity
                  example: New Project Launch
                date:
                  type: string
                  description: Date of the activity
                  example: 2024-01
                description:
                  type: string
                  description: Detailed description of the activity
                  example: Launched a new portfolio website using Next.js and AWS
      responses:
        "201":
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}:
    get:
      summary: Get an activity
      description: Retrieve a single activity by ID
      operationId: activities_get
      tags:
        - Activities
      security:
        - OAuth2:
            - api/activities.read
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update an activity
      description: Update an existing activity by ID
      operationId: activities_update
      tags:
        - Activities
      security:
        - OAuth2:
            - api/activities.write
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - date
                - description
              properties:
                title:
                  type: string
                  description: Title of the activity
                  example: Updated Project Launch
                date:
                  type: string
                  description: Date of the activity
                  example: 2024-01
                description:
                  type: string
                  description: Detailed description of the activity
                  example: Updated the portfolio website with new features
      responses:
        "200":
          description: Activity updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete an activity
      description: Delete an existing activity by ID
      operationId: activities_delete
      tags:
        - Activities
      security:
        - OAuth2:
            - api/activities.write
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "204":
          description: Activity deleted successfully
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

