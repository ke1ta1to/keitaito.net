      description: Retrieve the profile
      operationId: profile_get
      tags:
        - Profile
      security:
        - OAuth2:
            - api/profile.read
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update profile
      description: Create or update the profile (upsert)
      operationId: profile_update
      tags:
        - Profile
      security:
        - OAuth2:
            - api/profile.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - birthday
                - location
                - school
                - image_url
                - x
                - github
                - zenn
                - qiita
              properties:
                name:
                  type: string
                  description: Name
                  example: Keita Ito
                birthday:
                  type: string
                  format: date
                  description: Birthday (ISO 8601)
                  example: "2004-07-09"
                location:
                  type: string
                  description: Location
                  example: Tokyo
                school:
                  type: string
                  description: School
                  example: University of Tokyo
                image_url:
                  type: string
                  format: uri
                  description: Image URL
                  example: https://example.com/image.png
                x:
                  type: string
                  format: uri
                  description: X URL
                  example: https://x.com/keitaito
                github:
                  type: string
                  format: uri
                  description: GitHub URL
                  example: https://github.com/keitaito
                zenn:
                  type: string
                  format: uri
                  description: Zenn URL
                  example: https://zenn.dev/keitaito
                qiita:
                  type: string
                  format: uri
                  description: Qiita URL
                  example: https://qiita.com/keitaito
      responses:
